<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Director Quote</title>

<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  background:#050505;
  color:#eee;
  font-family:Inter,sans-serif;
}

.widget{
  width:100%;
  height:360px;
  background:
    linear-gradient(rgba(0,0,0,.86),rgba(0,0,0,.86)),
    url("take5.png") center/cover no-repeat;
  border:1px solid rgba(214,165,67,.35);
  border-radius:18px;
  display:grid;
  grid-template-columns:1.35fr .75fr;
  overflow:hidden;
}

.left{
  padding:28px 34px;
  border-right:1px solid rgba(214,165,67,.35);
  display:flex;
  flex-direction:column;
  justify-content:center;
}

.label{
  color:#d7aa45;
  font-family:Oswald;
  letter-spacing:5px;
  font-size:15px;
  margin-bottom:22px;
  text-align:center;
}

.quote{
  font-family:Oswald;
  font-size:36px;
  line-height:1.25;
  letter-spacing:2px;
  text-align:center;
  color:#f4efe6;
  text-transform:uppercase;
}

.author{
  margin-top:22px;
  color:#d7aa45;
  font-family:Oswald;
  letter-spacing:6px;
  font-size:20px;
  text-align:center;
}

.role{
  color:#ddd;
  letter-spacing:3px;
  font-size:12px;
  text-align:center;
  margin-top:5px;
}

.right{
  padding:24px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

.photo{
  width:105px;
  height:105px;
  border-radius:50%;
  border:1px solid rgba(214,165,67,.7);
  background:rgba(255,255,255,.06);
  display:flex;
  align-items:center;
  justify-content:center;
  color:#d7aa45;
  font-family:Oswald;
  font-size:34px;
  margin-bottom:14px;
}

.name{
  color:#d7aa45;
  font-family:Oswald;
  letter-spacing:3px;
  font-size:18px;
  text-align:center;
}

.known{
  margin:14px 0 10px;
  color:#eee;
  letter-spacing:4px;
  font-size:10px;
}

.movies{
  width:100%;
  max-width:240px;
}

.movie{
  border-top:1px solid rgba(214,165,67,.25);
  padding:8px 0;
  text-align:center;
}

.movie-title{
  font-family:Oswald;
  color:#f2f2f2;
  letter-spacing:2px;
  font-size:14px;
}

.year{
  color:#d7aa45;
  font-size:12px;
  margin-top:2px;
}

@media(max-width:700px){
  .widget{
    height:360px;
    grid-template-columns:1fr;
  }

  .right{
    display:none;
  }

  .left{
    border-right:none;
    padding:26px;
  }

  .quote{
    font-size:30px;
  }
}
</style>
</head>

<body>

<div class="widget">
  <div class="left">
    <div class="label">🎥 QUOTE OF THE DAY</div>
    <div class="quote" id="quote"></div>
    <div class="author" id="author"></div>
    <div class="role">DIRECTOR</div>
  </div>

  <div class="right">
    <div class="photo" id="initials"></div>
    <div class="name" id="name"></div>
    <div class="known">KNOWN FOR</div>

    <div class="movies" id="movies"></div>
  </div>
</div>

<script>
const directors = [
  {
    quote:'Cinema is a matter of what is in the frame and what is out.',
    author:'Martin Scorsese',
    movies:[
      ['Goodfellas','1990'],
      ['The Departed','2006'],
      ['Taxi Driver','1976'],
      ['The Irishman','2019']
    ]
  },
  {
    quote:'The audience is never wrong.',
    author:'Steven Spielberg',
    movies:[
      ['Jurassic Park','1993'],
      ['E.T.','1982'],
      ['Jaws','1975'],
      ['Saving Private Ryan','1998']
    ]
  },
  {
    quote:'If it can be written, or thought, it can be filmed.',
    author:'Stanley Kubrick',
    movies:[
      ['The Shining','1980'],
      ['2001: A Space Odyssey','1968'],
      ['Full Metal Jacket','1987'],
      ['A Clockwork Orange','1971']
    ]
  },
  {
    quote:'The secret to film is that it is an illusion.',
    author:'George Lucas',
    movies:[
      ['Star Wars','1977'],
      ['American Graffiti','1973'],
      ['THX 1138','1971'],
      ['Indiana Jones','1981']
    ]
  },
  {
    quote:'Make visible what, without you, might perhaps never have been seen.',
    author:'Robert Bresson',
    movies:[
      ['Pickpocket','1959'],
      ['Au Hasard Balthazar','1966'],
      ['A Man Escaped','1956'],
      ['L’Argent','1983']
    ]
  },
  {
    quote:'The enemy of art is the absence of limitations.',
    author:'Orson Welles',
    movies:[
      ['Citizen Kane','1941'],
      ['Touch of Evil','1958'],
      ['The Trial','1962'],
      ['F for Fake','1973']
    ]
  },
  {
    quote:'I do not always know what I want, but I do know what I do not want.',
    author:'Ava DuVernay',
    movies:[
      ['Selma','2014'],
      ['When They See Us','2019'],
      ['13th','2016'],
      ['Origin','2023']
    ]
  }
];

const today = new Date();
const start = new Date(today.getFullYear(),0,0);
const dayOfYear = Math.floor((today - start) / 86400000);
const index = dayOfYear % directors.length;
const d = directors[index];

document.getElementById("quote").innerText = `“${d.quote}”`;
document.getElementById("author").innerText = d.author.toUpperCase();
document.getElementById("name").innerText = d.author.toUpperCase();

document.getElementById("initials").innerText =
  d.author.split(" ").map(w=>w[0]).join("").slice(0,2);

document.getElementById("movies").innerHTML =
  d.movies.map(m => `
    <div class="movie">
      <div class="movie-title">${m[0]}</div>
      <div class="year">${m[1]}</div>
    </div>
  `).join("");
</script>

</body>
</html>
